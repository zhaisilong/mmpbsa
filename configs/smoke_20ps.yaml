protocol:
  production_ns: 0.02
  xtc_interval_ps: 2.0
  mmpbsa_start_ns: 0.0
  mmpbsa_interval_ps: 2.0
  min_mmpbsa_frames: 5

system:
  temperature_k: 300.0
  salt_molar: 0.150
  solvent_padding_angstrom: 10.0
  solvent_shape: oct
  allow_box_retry: false

amber_prep:
  recipe: protein_ligand_gaff2_tip3p
  nonstandard_policy: strip
  default_ligand_param_mode: auto
  protein_ff: leaprc.protein.ff14SB
  ligand_ff: leaprc.gaff2
  water_ff: leaprc.water.tip3p
  gaff_version: gaff2
  charge_method: bcc
  pb_radii: mbondi2

md:
  em_steps: 200
  emstep: 0.001
  nvt_steps: 500
  npt_steps: 500
  seed_base: 2026052401
  ntomp: 4

mmpbsa:
  enabled: true
  mpi: false
  np: 1
  keep_tmp: false
  internal_limit_kcal_mol: 20000.0
  internal_std_limit_kcal_mol: 5000.0

qc:
  receptor_rmsd_fail_angstrom: 5.0
  ligand_rmsd_warn_angstrom: 10.0
  peptide_rmsd_warn_angstrom: 10.0
  native_contacts_fail_min: 0
  interface_distance_fail_angstrom: 8.0

export:
  pymol_stride: 1

runtime:
  mamba_env: md
  gmxrc: ${GMXRC}
  gmx_bin: gmx_mpi
  gpu_id: 0
  mpi4py_path: ""

debug:
  keep_step_tmp: false
